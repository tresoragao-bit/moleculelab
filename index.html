<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MoleculeLab - 3D Molecular Builder</title>
<script src="https://3Dmol.org/build/3Dmol-min.js"></script>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0a0a0a;
    color:white;
    text-align:center;
}

h1 {
    margin:10px;
}

#viewer {
    width:100%;
    height:65vh;
}

.controls {
    padding:15px;
}

input, select, button {
    padding:10px;
    margin:5px;
    border-radius:8px;
    border:none;
    font-size:15px;
}

button {
    background:#00ffcc;
    cursor:pointer;
}

button:hover {
    background:#00cc99;
}
</style>
</head>

<body>

<h1>🧪 MoleculeLab</h1>

<div class="controls">
    Nombre d'atomes :
    <input type="number" id="atomCount" value="10" min="2">

    Élément :
    <select id="element">
        <option value="C">Carbone (C)</option>
        <option value="O">Oxygène (O)</option>
        <option value="N">Azote (N)</option>
        <option value="H">Hydrogène (H)</option>
    </select>

    <button onclick="generate()">Générer</button>
    <button onclick="downloadXYZ()">Télécharger XYZ</button>
</div>

<div id="viewer"></div>

<script>

let viewer = $3Dmol.createViewer("viewer", {backgroundColor: "black"});
let currentXYZ = "";

function generate() {

    let count = parseInt(document.getElementById("atomCount").value);
    let element = document.getElementById("element").value;

    currentXYZ = count + "\nMoleculeLab\n";

    for (let i = 0; i < count; i++) {
        currentXYZ += element + " " + (i * 1.5) + " 0 0\n";
    }

    viewer.clear();
    viewer.addModel(currentXYZ, "xyz");
    viewer.setStyle({}, {stick:{}, sphere:{scale:0.3}});
    viewer.zoomTo();
    viewer.spin(true);
    viewer.render();
}

function downloadXYZ() {
    let blob = new Blob([currentXYZ], {type: "text/plain"});
    let link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "molecule.xyz";
    link.click();
}

generate();

</script>

</body>
</html>
